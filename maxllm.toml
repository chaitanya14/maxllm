# MaxLLM Gateway Configuration
# Environment variables can be referenced with ${VAR_NAME} syntax.

# Global plugins run on every request, in order.
global_plugins = ["request_id", "api_auth"]

[server]
listen = "0.0.0.0:8080"
threads = 4
# tcp_reuseport = true
# tcp_fastopen = 256

[metrics]
enabled = true

# --- Model Aliases ---
# Map requested model names to actual model names.
[model_aliases]
"gpt-4" = "gpt-4o"
"claude-3" = "claude-sonnet-4-20250514"

# --- Admin API (optional) ---
# [admin]
# master_key = "${MAXLLM_MASTER_KEY}"
# enabled = true

# --- Model Cost Overrides (supplement built-in costs) ---
# [model_costs."custom-model"]
# input_per_1m = 1.00
# output_per_1m = 3.00

# --- Plugins ---

[plugins.request_id]
category = "request_id"
header_name = "X-Request-Id"

[plugins.api_auth]
category = "key_auth"
header = "Authorization"
strip_prefix = "Bearer "
keys = ["sk-maxllm-dev-key"]

# [plugins.ip_guard]
# category = "ip_restriction"
# type = "deny"
# ip_list = ["10.0.0.0/8"]

[plugins.rate_limiter]
category = "rate_limit"
requests_per_minute = 600
key = "client_ip"

[plugins.cors]
category = "cors"
allow_origin = "*"
allow_methods = "GET, POST, OPTIONS"
allow_headers = "Content-Type, Authorization"
max_age = "86400"

