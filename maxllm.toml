# --- Routes ---

[[routes]]
path = "/v1/chat/completions"
provider = "openai"
fallback = ["anthropic"]
timeout_secs = 120
strategy = "fallback"
plugins = ["rate_limiter", "cors"]
# guardrails = ["injection-guard", "pii-check", "secret-scan"]  # Only these guardrails run for this route

[[routes]]
path = "/v1/anthropic"
provider = "anthropic"
fallback = ["openai"]
plugins = ["rate_limiter", "cors"]
# guardrails = ["injection-guard"]  # Minimal guardrails for this route

[[routes]]
path = "/v1/ollama"
provider = "ollama"
timeout_secs = 120
plugins = ["rate_limiter", "cors"]
# guardrails = []  # Empty = all default_on guardrails apply

[[routes]]
path = "/v1/gemini"
provider = "gemini"
timeout_secs = 120
plugins = ["rate_limiter", "cors"]

# Mock route for perf testing (no rate limit)
[[routes]]
path = "/v1/mock"
provider = "mock"
timeout_secs = 10
plugins = ["cors"]

# Bare proxy route — no plugins, pure routing + upstream (perf baseline)
[[routes]]
path = "/v1/proxy"
provider = "mock"
timeout_secs = 10
plugins = []

# --- Native Provider Endpoints ---
# Accept provider-native request format directly (no translation).
# Clients use the provider's own SDK/format, gateway adds auth + logging.

# Anthropic Messages API (native format)
# curl -d '{"model":"claude-sonnet-4-20250514","max_tokens":1024,"messages":[...]}' /v1/messages
# [[routes]]
# path = "/v1/messages"
# provider = "anthropic"
# endpoint_type = "native"
# timeout_secs = 120
# plugins = ["rate_limiter", "cors"]

# Gemini generateContent API (native format)
# curl -d '{"contents":[{"parts":[{"text":"Hello"}]}]}' /v1beta/models/gemini-2.5-flash:generateContent
# [[routes]]
# path = "/v1beta/models"
# provider = "gemini"
# endpoint_type = "native"
# timeout_secs = 120
# plugins = ["rate_limiter", "cors"]

# --- Pass-Through Endpoints ---
# Raw proxy to provider APIs — zero body parsing or translation.
# Client-supplied path suffix is forwarded to the provider's base URL.

# Pass-through to Anthropic (any endpoint)
# curl /passthrough/anthropic/v1/messages -d '...'
# [[routes]]
# path = "/passthrough/anthropic"
# provider = "anthropic"
# endpoint_type = "passthrough"
# plugins = ["rate_limiter"]

# Pass-through to OpenAI (any endpoint)
# curl /passthrough/openai/v1/chat/completions -d '...'
# [[routes]]
# path = "/passthrough/openai"
# provider = "openai"
# endpoint_type = "passthrough"
# plugins = ["rate_limiter"]

# Pass-through to Gemini (any endpoint)
# curl /passthrough/gemini/v1beta/models/gemini-2.5-flash:generateContent -d '...'
# [[routes]]
# path = "/passthrough/gemini"
# provider = "gemini"
# endpoint_type = "passthrough"
# plugins = ["rate_limiter"]

