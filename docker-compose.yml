version: "3.8"

services:
  gateway:
    image: chaitanyadev14/maxllm:latest
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ./maxllm.toml:/app/maxllm.toml:ro
      - maxllm-data:/app/data
    environment:
      - RUST_LOG=info
      # Set your API keys here or in a .env file
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "maxllm", "health", "--url", "http://127.0.0.1:8080"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 3

volumes:
  maxllm-data:
    driver: local
